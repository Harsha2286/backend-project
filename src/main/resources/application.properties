# Spring Boot application configuration for Course Cloud LMS

spring.application.name=course-cloud-backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fsad-project?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Email (Gmail SMTP) ──────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── JWT ─────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:CourseCloudSecretKey2024SuperLongSecretKeyForHMACSHA256Algorithm}
app.jwt.expiration=86400000

# ─── Email Verification Token Expiry (hours) ─────────────────────────
app.verification.token.expiry.hours=24

# ─── OTP Expiry (minutes) ────────────────────────────────────────────
app.otp.expiry.minutes=10

# ─── Application URLs ───────────────────────────────────────────────
# Backend base URL (used internally)
app.base.url=${APP_BASE_URL:http://localhost:8080}
# Frontend base URL (used in email verification links so the user lands on the UI)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Comma-separated allowed CORS origins (used by SecurityConfig)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:5174}

# ─── Logging ─────────────────────────────────────────────────────────
logging.level.com.coursecloud=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ─── Multipart (file uploads) ────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
