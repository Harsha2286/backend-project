# Spring Boot application configuration for Course Cloud LMS

# ─── Server ─────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/coursecloud_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=9959417438@Harsha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Email (Gmail SMTP) ──────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=harshavardhan2286@gmail.com
spring.mail.password=huiuwikngkyppszl
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── JWT ─────────────────────────────────────────────────────────────
app.jwt.secret=CourseCloudSecretKey2024SuperLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration=86400000

# ─── Email Verification Token Expiry (hours) ─────────────────────────
app.verification.token.expiry.hours=24

# ─── OTP Expiry (minutes) ────────────────────────────────────────────
app.otp.expiry.minutes=10

# ─── Application URLs ───────────────────────────────────────────────
# Backend base URL (used internally)
app.base.url=http://localhost:8080
# Frontend base URL (used in email verification links so the user lands on the UI)
app.frontend.url=http://localhost:5173

# ─── Logging ─────────────────────────────────────────────────────────
logging.level.com.coursecloud=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ─── Multipart (file uploads) ────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
